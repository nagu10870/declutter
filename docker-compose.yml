version: '3.9'

services:
  # ── PostgreSQL (with pgvector) ────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: declutter
      POSTGRES_PASSWORD: declutter
      POSTGRES_DB: declutter_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U declutter"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (message broker + result backend) ───────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://declutter:declutter@db:5432/declutter_db
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (Month 4) ───────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://declutter:declutter@db:5432/declutter_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.services.workers.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat Scheduler (periodic tasks) ────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://declutter:declutter@db:5432/declutter_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - worker
    volumes:
      - ./backend:/app
    command: celery -A app.services.workers.celery_app beat --loglevel=info

  # ── Flower (Celery monitoring UI) ─────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - worker
    volumes:
      - ./backend:/app
    command: celery -A app.services.workers.celery_app flower --port=5555

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
